<!DOCTYPE html>
<html>
<head>
    <title>3D Game</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: black; 
        }
        canvas { 
            display: block; 
        }
        #healthBar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 200px;
            height: 20px;
            background: #444;
            border-radius: 5px;
        }
        #healthFill {
            height: 100%;
            width: 100%;
            background: #48ff00;
            border-radius: 5px;

        }
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: #FFFFFF;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #killFeed {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 300px;
            font-family: Arial;
            font-size: 16px;
            color: #FFFFFF;
            text-align: right;
        }
        #killMessage {
            margin-bottom: 6px;
            opacity: 1;
            transition: opacity o.5s;
        }
    </style>
</head>
<body>
    <div id="healthBar">
        <div id="healthFill"></div>
    </div>
    <div id="crosshair"></div>
    <div id="killFeed"></div>
    <script type="module" src="game.js"></script>

</body>
</html>
