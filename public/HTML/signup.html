<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - My Shooter</title>
    <link rel="stylesheet" href="./../CSS/signup.html.css">
</head>
<body>

<div class="screen">
    <h1>Sign Up</h1>

    <div class="form">
        <input type="text" id="signupUsername" placeholder="Username">
        <input type="email" id="signupEmail" placeholder="Email">
        <input type="password" id="signupPassword" placeholder="Password">
        <input type="password" id="signupPasswordConfirm" placeholder="Confirm Password">
        <button id="submitSignup">Create Account</button>
        <a href="index.html">Back To Home</a>
    </div>
</div>

<script type="module" src="./../JAVASCRIPT/signup.js"></script>
</body>
</html>
